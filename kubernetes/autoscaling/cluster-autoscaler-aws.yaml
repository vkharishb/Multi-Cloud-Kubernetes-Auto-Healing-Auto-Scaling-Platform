apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-autoscaler
  namespace: kube-system
  labels:
    app.kubernetes.io/name: cluster-autoscaler
    app.kubernetes.io/component: autoscaling
    cloud: aws
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-autoscaler
  labels:
    app.kubernetes.io/name: cluster-autoscaler
rules:
  - apiGroups: [""]
    resources:
      - events
      - endpoints
    verbs: ["create", "patch"]
  - apiGroups: [""]
    resources:
      - pods/eviction
    verbs: ["create"]
  - apiGroups: [""]
    resources:
      - pods/status
    verbs: ["update"]
  - apiGroups: [""]
    resources:
      - endpoints
    resourceNames:
      - cluster-autoscaler
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources:
      - nodes
    verbs: ["watch", "list", "get", "update"]
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - services
      - replicationcontrollers
      - persistentvolumeclaims
      - persistentvolumes
    verbs: ["watch", "list", "get"]
  - apiGroups: ["apps"]
    resources:
      - daemonsets
      - replicasets
      - statefulsets
    verbs: ["watch", "list", "get"]
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["watch", "list"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - csinodes
      - csidrivers
      - csistoragecapacities
    verbs: ["watch", "list", "get"]
  - apiGroups: ["batch", "extensions"]
    resources:
      - jobs
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources:
      - leases
    verbs: ["create"]
  - apiGroups: ["coordination.k8s.io"]
    resourceNames:
      - cluster-autoscaler
    resources:
      - leases
    verbs: ["get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cluster-autoscaler
  namespace: kube-system
  labels:
    app.kubernetes.io/name: cluster-autoscaler
rules:
  - apiGroups: [""]
    resources:
      - configmaps
    verbs: ["create"]
  - apiGroups: [""]
    resources:
      - configmaps
    resourceNames:
      - cluster-autoscaler-status
      - cluster-autoscaler-priority-expander
    verbs: ["delete", "get", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-autoscaler
  labels:
    app.kubernetes.io/name: cluster-autoscaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-autoscaler
subjects:
  - kind: ServiceAccount
    name: cluster-autoscaler
    namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cluster-autoscaler
  namespace: kube-system
  labels:
    app.kubernetes.io/name: cluster-autoscaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cluster-autoscaler
subjects:
  - kind: ServiceAccount
    name: cluster-autoscaler
    namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-autoscaler
  namespace: kube-system
  labels:
    app.kubernetes.io/name: cluster-autoscaler
    app.kubernetes.io/component: autoscaling
    cloud: aws
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cluster-autoscaler
      cloud: aws
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cluster-autoscaler
        app.kubernetes.io/component: autoscaling
        cloud: aws
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    spec:
      serviceAccountName: cluster-autoscaler
      priorityClassName: system-cluster-critical
      containers:
        - name: cluster-autoscaler
          image: registry.k8s.io/autoscaling/cluster-autoscaler:v1.33.0
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 300Mi
            limits:
              cpu: 200m
              memory: 600Mi
          command:
            - ./cluster-autoscaler
            - --cloud-provider=aws
            - --namespace=kube-system
            - --cluster-name=mcp-dev-eks
            - --node-group-auto-discovery=asg:tag=k8s.io/cluster-autoscaler/enabled,k8s.io/cluster-autoscaler/mcp-dev-eks
            - --balance-similar-node-groups
            - --skip-nodes-with-local-storage=false
            - --skip-nodes-with-system-pods=false
            - --scale-down-enabled=true
            - --scale-down-delay-after-add=10m
            - --scale-down-unneeded-time=10m
            - --expander=least-waste
            - --v=4
          env:
            - name: AWS_REGION
              value: ap-south-1
            - name: AWS_STS_REGIONAL_ENDPOINTS
              value: regional
          volumeMounts:
            - name: ssl-certs
              mountPath: /etc/ssl/certs/ca-certificates.crt
              readOnly: true
      volumes:
        - name: ssl-certs
          hostPath:
            path: /etc/ssl/certs/ca-bundle.crt
