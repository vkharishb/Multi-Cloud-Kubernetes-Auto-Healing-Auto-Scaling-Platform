apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: app-nodesjs-networkpolicy
  namespace: app-dev
  labels:
    app: app-nodesjs
    environment: dev
    platform: multi-cloud
spec:
  podSelector:
    matchLabels:
      app: app-nodesjs
      environment: dev
      platform: multi-cloud
  policyTypes:
    - Ingress
    - Egress
ingress:
  - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: ingress-nginx
    ports:
      - protocol: TCP
        port: 3000
egress:
  - to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system
    ports:
      - protocol: UDP
        port: 53
      - protocol: TCP
        port: 53